apiVersion: v1alpha1
kind: Installation
metadata:
  name: signoz
spec:
  deployment:
    flavor: compose
    mode: docker
  ingester:
    spec:
      image: signoz/signoz-otel-collector@sha256:7e4e539a73f1f88fbc1cd7e659ab3950908e83ce1f2a37a297452f910d072174
      version: "sha256-7e4e539a73f1"
  mcp:
    spec:
      enabled: true
      image: signoz/signoz-mcp-server@sha256:75327a2cea4ba7762e989d911edda62a126cb8d0f895b8940c7466b2e0ec514c
      version: "sha256-75327a2cea4b"
  metastore:
    kind: postgres
    spec:
      image: postgres@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
      version: "16"
  signoz:
    spec:
      image: signoz/signoz@sha256:89d6ab254a02c8feb10d1a9ff0e0979f16eb1b9fedecb5dd169f89b5194a6ef3
      version: "sha256-89d6ab254a02"
  telemetrykeeper:
    kind: clickhousekeeper
    spec:
      image: clickhouse/clickhouse-keeper@sha256:525b8b0f93ccb371131c46f22a066ea43d33d74aba314203e8044609945d8524
      version: "25.12.5"
  telemetrystore:
    kind: clickhouse
    spec:
      image: clickhouse/clickhouse-server@sha256:cacf32d6884291dc2ff5e0156a97f46fc53ff7c929a7906d114e268a929dfd3a
      version: "25.12.5"
  patches:
    - target: "deployment/compose.yaml"
      operations:
        - op: replace
          path: /services/ingester/ports/0
          value: "127.0.0.1:4317:4317"
        - op: replace
          path: /services/ingester/ports/1
          value: "127.0.0.1:4318:4318"
        - op: replace
          path: /services/signoz-mcp/ports/0
          value: "127.0.0.1:8001:8000"
        - op: replace
          path: /services/signoz-signoz-0/ports/0
          value: "127.0.0.1:8080:8080"
